<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Terminal</title>
    <style>
        body { background-color: #050a15; color: #58a6ff; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }

        #neural-interface { position: relative; width: 150px; height: 150px; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; }
        .ring { position: absolute; border-radius: 50%; border: 2px solid transparent; box-shadow: 0 0 10px rgba(88, 166, 255, 0.2); }
        .r1 { width: 100%; height: 100%; border-top: 3px solid #58a6ff; border-bottom: 3px solid #58a6ff; animation: spin 6s linear infinite; }
        .r2 { width: 75%; height: 75%; border-right: 3px solid #79c0ff; border-left: 3px solid #79c0ff; animation: spin 4s linear infinite reverse; }
        .core-glow { width: 40%; height: 40%; background: radial-gradient(circle, #79c0ff 0%, transparent 70%); border-radius: 50%; opacity: 0.2; transition: all 0.3s; }

        .thinking .r1, .thinking .r2 { border-color: #ffb000; animation-duration: 1.5s; }
        .thinking .core-glow { background: radial-gradient(circle, #ffb000 0%, transparent 70%); }
        .speaking .r1, .speaking .r2 { border-color: #00ffff; animation-duration: 2s; }
        .speaking .core-glow { background: radial-gradient(circle, #00ffff 0%, transparent 80%); animation: voicePulse 0.3s infinite alternate; opacity: 1; }

        .listening .r1, .listening .r2 { border-color: #ff4a4a; animation-duration: 1s; }
        .listening .core-glow { background: radial-gradient(circle, #ff4a4a 0%, transparent 80%); opacity: 0.8; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes voicePulse { 0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 20px #00ffff; } 100% { transform: scale(1.4); opacity: 1; box-shadow: 0 0 50px #00ffff; } }

        #chat-box { width: 80%; max-width: 800px; height: 300px; background-color: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 8px; padding: 20px; overflow-y: auto; margin-bottom: 20px; backdrop-filter: blur(5px); }
        .mensagem { margin-bottom: 15px; line-height: 1.5; }
        .user { color: #c9d1d9; }
        .jarvis { color: #79c0ff; font-weight: bold; }
        .sistema { color: #8b949e; font-style: italic; }

        #input-container { width: 80%; max-width: 800px; display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 15px; background-color: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 5px; font-family: inherit; font-size: 16px; outline: none;}
        button { padding: 15px 25px; background-color: #1f6feb; color: white; border: none; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #388bfd; box-shadow: 0 0 15px #388bfd; }

        #btnMic { background-color: #238636; width: 60px; font-size: 20px; display: flex; justify-content: center; align-items: center; }
        #btnMic:hover { background-color: #2ea043; box-shadow: 0 0 15px #2ea043; }
        #btnMic.gravando { background-color: #da3633; box-shadow: 0 0 20px #da3633; animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="neural-interface">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="core-glow"></div>
</div>

<div id="chat-box">
    <div class="mensagem sistema">Conexão estabelecida... Sistemas auditivos online.</div>
</div>

<div id="input-container">
    <button id="btnMic" onclick="ativarOuvidos()" title="Falar com J.A.R.V.I.S.">🎤</button>
    <input type="text" id="mensagemInput" placeholder="Aguardando comando..." onkeypress="if(event.key === 'Enter') enviarComando()" autocomplete="off">
    <button onclick="enviarComando()" id="btnEnviar">Enviar</button>
</div>

<script>
    const inputElement = document.getElementById('mensagemInput');
    const chatBox = document.getElementById('chat-box');
    const btnEnviar = document.getElementById('btnEnviar');
    const neuralCore = document.getElementById('neural-interface');
    const btnMic = document.getElementById('btnMic');

    function ativarOuvidos() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Senhor, este navegador não suporta a interface de áudio. Recomendo o uso do Google Chrome ou Edge.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            btnMic.classList.add('gravando');
            neuralCore.className = 'listening';
            inputElement.placeholder = "Ouvindo atentamente, Senhor...";
        };

        recognition.onresult = (event) => {
            const transcricao = event.results[0][0].transcript;
            inputElement.value = transcricao;
            enviarComando();
        };

        recognition.onerror = (event) => {
            console.error("Erro no microfone:", event.error);
            restaurarUI();
        };

        recognition.onend = () => {
            restaurarUI();
        };

        recognition.start();
    }

    function restaurarUI() {
        btnMic.classList.remove('gravando');
        inputElement.placeholder = "Aguardando comando...";
        if(neuralCore.className === 'listening') {
            neuralCore.className = '';
        }
    }

    async function enviarComando() {
        const texto = inputElement.value.trim();
        if (!texto) return;

        chatBox.innerHTML += `<div class="mensagem user"><strong>Lucas:</strong> ${texto}</div>`;
        inputElement.value = '';
        btnEnviar.disabled = true;
        btnMic.disabled = true;
        chatBox.scrollTop = chatBox.scrollHeight;
        neuralCore.className = 'thinking';

        try {
            const response = await fetch(`/api/jarvis/falar?mensagem=${encodeURIComponent(texto)}`);
            const respostaJarvis = await response.text();

            chatBox.innerHTML += `<div class="mensagem jarvis"><strong>J.A.R.V.I.S.:</strong> ${respostaJarvis}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            neuralCore.className = 'speaking';

            const tempoDeFalaEstimado = (respostaJarvis.length / 15) * 1000;
            setTimeout(() => { neuralCore.className = ''; }, tempoDeFalaEstimado);

        } catch (error) {
            chatBox.innerHTML += `<div class="mensagem sistema" style="color: #ff7b72;">Erro: ${error.message}</div>`;
            neuralCore.className = '';
        }

        btnEnviar.disabled = false;
        btnMic.disabled = false;
    }
</script>
</body>
</html>
